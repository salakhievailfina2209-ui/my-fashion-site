    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-brand { color: #3C4242; }
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #8A33FD;
            color: white;
            padding: 16px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(138, 51, 253, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 3000;
            font-weight: 500;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-white text-gray-800">

    <header class="border-b sticky top-0 bg-white z-50">
    <div class="container mx-auto px-4 py-4 flex items-center text-sm md:text-base">
        
        <div class="flex items-center space-x-14"> 
            <div class="text-3xl font-black tracking-tighter text-black italic">Euphoria</div>
            <nav class="hidden md:flex space-x-6 font-semibold text-gray-500">
                <a href="index.html" class="hover:text-black">Магазин</a>
                <a href="men.html" class="hover:text-black">Мужское</a>
                <a href="women.html" class="hover:text-black">Женское</a>
                <a href="sets.html" class="hover:text-black">Наборы</a>
                <a href="new.html" class="hover:text-black">Новости</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4 ml-auto">
            <div class="flex space-x-4 text-xl">
                <a href="wishlist.html" class="hover:scale-110 transition">♡</a>
                <a href="profile.html" class="hover:scale-110 transition">👤</a>
                <a href="cart.html" class="hover:scale-110 transition">🛒</a>
            </div>
        </div>
    </div>
</header>

    <section class="bg-[#2A2F2F] text-white py-12">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-2">Корзина</h1>
            <p id="cartHeaderText" class="text-gray-300">Ваши выбранные товары</p>
        </div>
    </section>

    <section class="py-12 px-4">
        <div class="container mx-auto max-w-6xl">
            <div id="cartContainer"></div>
        </div>
    </section>

    <footer class="bg-[#18181b] text-white py-16 relative overflow-hidden" style="background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 30px 30px;">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent"></div>
        <div class="container mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-12 relative z-10">
            <div>
                <h4 class="font-bold text-xl mb-6 tracking-wider relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-0.5 after:bg-gradient-to-r after:from-purple-500 after:to-pink-500">Помощь</h4>
                <ul class="text-gray-400 space-y-3 text-sm">
                    <li><a href="contacts.html" class="hover:text-white transition-all duration-300 hover:translate-x-1 inline-block">Контакты</a></li>
                </ul>
            </div>
            <div>
                <h4 class="font-bold text-xl mb-6 tracking-wider relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-0.5 after:bg-gradient-to-r after:from-purple-500 after:to-pink-500">Компания</h4>
                <ul class="text-gray-400 space-y-3 text-sm">
                    <li><a href="about.html" class="hover:text-white transition-all duration-300 hover:translate-x-1 inline-block">О нас</a></li>
                </ul>
            </div>
            <div>
                <h4 class="font-bold text-xl mb-6 tracking-wider relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-0.5 after:bg-gradient-to-r after:from-purple-500 after:to-pink-500">Инфо</h4>
                <ul class="text-gray-400 space-y-3 text-sm">
                    <li><a href="terms.html" class="hover:text-white transition-all duration-300 hover:translate-x-1 inline-block">Условия пользования</a></li>
                </ul>
            </div>
            <div>
                <h4 class="font-bold text-xl mb-6 tracking-wider relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-0.5 after:bg-gradient-to-r after:from-purple-500 after:to-pink-500">Контакты</h4>
                <p class="text-gray-400 text-sm mb-3 italic underline decoration-purple-500/30">support@euphoria.ru</p>
                <p class="text-gray-400 text-sm leading-relaxed">Москва, ул. Пушкина, дом 10, офис 404</p>
                <div class="mt-8 flex space-x-4">
                    <span class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center hover:scale-110 hover:bg-gradient-to-r hover:from-blue-600 hover:to-blue-400 cursor-pointer transition-all duration-300 border border-zinc-700 hover:border-transparent text-sm font-medium">VK</span>
                    <span class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center hover:scale-110 hover:bg-gradient-to-r hover:from-pink-600 hover:to-pink-400 cursor-pointer transition-all duration-300 border border-zinc-700 hover:border-transparent text-sm font-medium">IG</span>
                    <span class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center hover:scale-110 hover:bg-gradient-to-r hover:from-sky-500 hover:to-sky-300 cursor-pointer transition-all duration-300 border border-zinc-700 hover:border-transparent text-sm font-medium">TG</span>
                </div>
            </div>
        </div>
        <div class="container mx-auto px-4 mt-16 pt-6 border-t border-zinc-800/50 text-center">
            <p class="text-gray-600 text-xs tracking-[0.3em] uppercase bg-zinc-900/50 py-2 px-4 inline-block rounded-full backdrop-blur-sm">Copyright © 2024 Euphoria Clothing. Все права защищены.</p>
        </div>
    </footer>

    <script>
        const CART_KEY = 'cart';
        const LOGGED_IN_KEY = 'isLoggedIn';

        function isAuthenticated() {
            return localStorage.getItem(LOGGED_IN_KEY) === 'true';
        }

        if (!isAuthenticated()) {
            document.getElementById('cartContainer').innerHTML = `
                <div class="text-center py-16 bg-white rounded-3xl shadow-xl">
                    <i class="fas fa-lock text-7xl text-[#8A33FD] mb-6"></i>
                    <h2 class="text-3xl font-bold text-brand mb-3">Доступ ограничен</h2>
                    <p class="text-gray-500 mb-8">Чтобы просмотреть корзину, войдите в аккаунт</p>
                    <a href="login.html" class="inline-block bg-[#8A33FD] text-white px-10 py-4 rounded-lg font-bold hover:bg-[#6f2fc7] transition shadow-lg">Войти</a>
                </div>
            `;
            document.getElementById('cartHeaderText').textContent = 'Требуется авторизация';
        } else {
            let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];

            function renderCart() {
                const cartContainer = document.getElementById('cartContainer');
                const cartHeaderText = document.getElementById('cartHeaderText');

                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

                if (cart.length === 0) {
                    cartContainer.innerHTML = `
                        <div class="text-center py-16 bg-white rounded-3xl shadow-xl">
                            <i class="fas fa-shopping-bag text-7xl text-[#8A33FD] mb-6"></i>
                            <h2 class="text-3xl font-bold text-brand mb-3">Корзина пуста</h2>
                            <p class="text-gray-500 mb-8">Добавьте товары, чтобы оформить заказ</p>
                            <a href="index.html" class="inline-block bg-[#8A33FD] text-white px-10 py-4 rounded-lg font-bold hover:bg-[#6f2fc7] transition shadow-lg">Перейти к покупкам</a>
                        </div>
                    `;
                    cartHeaderText.textContent = 'Добавьте товары в корзину';
                    return;
                }

                cartHeaderText.textContent = `Товаров: ${totalItems}`;

                let subtotal = 0;
                let itemsHtml = '';

                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    subtotal += itemTotal;

                    itemsHtml += `
                        <div class="flex flex-col md:flex-row gap-6 p-6 border-b border-gray-100 last:border-b-0" data-index="${index}">
                            <div class="w-full md:w-32 h-40 flex-shrink-0">
                                <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover rounded-lg">
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg">${item.title}</h3>
                                <p class="text-gray-500 text-sm mb-2">${item.category || 'Одежда'}</p>
                                <div class="text-[#8A33FD] font-bold text-xl mb-4">${item.price.toLocaleString()} ₽</div>
                                <div class="flex items-center gap-4">
                                    <button class="w-8 h-8 bg-gray-100 rounded-full hover:bg-[#8A33FD] hover:text-white transition" onclick="updateQuantity(${index}, -1)">−</button>
                                    <span class="font-semibold w-8 text-center">${item.quantity}</span>
                                    <button class="w-8 h-8 bg-gray-100 rounded-full hover:bg-[#8A33FD] hover:text-white transition" onclick="updateQuantity(${index}, 1)">+</button>
                                </div>
                            </div>
                            <div class="flex flex-row md:flex-col items-center md:items-end justify-between md:justify-start gap-4">
                                <div class="font-bold text-lg text-[#8A33FD]">${itemTotal.toLocaleString()} ₽</div>
                                <button class="text-red-500 hover:text-red-700 transition" onclick="removeItem(${index})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                const shipping = subtotal > 5000 ? 0 : 500;
                const total = subtotal + shipping;

                cartContainer.innerHTML = `
                    <div class="grid lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white rounded-3xl shadow-xl p-6">
                            ${itemsHtml}
                        </div>
                        <div class="bg-white rounded-3xl shadow-xl p-6 h-fit lg:sticky lg:top-24">
                            <h2 class="text-xl font-bold mb-4 pb-2 border-b border-gray-100">Ваш заказ</h2>
                            <div class="space-y-3 text-gray-600">
                                <div class="flex justify-between">
                                    <span>Товары:</span>
                                    <span class="font-semibold">${subtotal.toLocaleString()} ₽</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Доставка:</span>
                                    <span class="font-semibold">${shipping === 0 ? 'Бесплатно' : shipping.toLocaleString() + ' ₽'}</span>
                                </div>
                                
                                <div class="flex justify-between text-lg font-bold mt-4 pt-4 border-t border-gray-100">
                                    <span>Итого:</span>
                                    <span class="text-[#8A33FD]" id="totalAmount">${total.toLocaleString()} ₽</span>
                                </div>
                                <button onclick="checkout()" class="w-full bg-[#8A33FD] text-white py-3 rounded-lg font-bold hover:bg-[#6f2fc7] transition shadow-lg mt-4" ${totalItems === 0 ? 'disabled' : ''}>
                                    Оформить заказ
                                </button>
                                <a href="index.html" class="block text-center w-full border-2 border-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-100 transition mt-2">
                                    Продолжить покупки
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }

            window.updateQuantity = function(index, change) {
                const newQuantity = cart[index].quantity + change;
                if (newQuantity < 1) {
                    removeItem(index);
                    return;
                }
                cart[index].quantity = newQuantity;
                localStorage.setItem(CART_KEY, JSON.stringify(cart));
                renderCart();
                showNotification('Количество обновлено');
            };

            window.removeItem = function(index) {
                cart.splice(index, 1);
                localStorage.setItem(CART_KEY, JSON.stringify(cart));
                renderCart();
                showNotification('Товар удалён из корзины');
            };

            window.applyPromo = function() {
                const promo = document.getElementById('promoInput').value.toUpperCase();
                if (promo === 'STYLE10') {
                    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                    const discount = subtotal * 0.1;
                    const total = subtotal - discount + (subtotal > 5000 ? 0 : 500);
                    document.getElementById('totalAmount').textContent = total.toLocaleString() + ' ₽';
                    showNotification(`Промокод применён! Скидка 10% (${Math.round(discount).toLocaleString()} ₽)`);
                } else {
                    showNotification('Неверный промокод');
                }
            };

            window.checkout = function() {
                if (!isAuthenticated()) {
                    showNotification('Необходимо войти в аккаунт');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    return;
                }
                if (cart.length === 0) {
                    showNotification('Корзина пуста');
                    return;
                }
                showNotification('Заказ оформлен! Спасибо за покупку');
                cart = [];
                localStorage.setItem(CART_KEY, JSON.stringify(cart));
                setTimeout(() => renderCart(), 1500);
            };

            function showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }

            renderCart();
        }
    </script>
</body>
</html>
